<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Ligipääsetav stand-up</title>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-2MYD7NST72"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-2MYD7NST72');
  </script>

  <style>
    :root {
      --bg: #0f0f10;
      --panel: #17181a;
      --text: #ffffff;
      --muted: #b7b7b7;
      --accent: #fa78d1;
      --accent-2: #6fc3ff;
      --radius: 14px;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      background:
        radial-gradient(1200px 800px at 10% -10%, rgba(250,120,209,.12), transparent 60%),
        radial-gradient(1200px 800px at 110% 10%, rgba(111,195,255,.12), transparent 60%),
        var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: max(env(safe-area-inset-top), 32px) clamp(20px, 5vw, 48px) 48px;
      text-align: center;
    }

    .card {
      background: color-mix(in oklab, var(--panel) 92%, black);
      border: 1px solid rgba(255,255,255,.07);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      padding: clamp(32px, 7vw, 60px) clamp(24px, 6vw, 56px);
      max-width: 600px;
      width: 100%;
    }

    .badge {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(250,120,209,.1);
      border: 1px solid rgba(250,120,209,.25);
      border-radius: 100px;
      padding: 5px 14px;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(26px, 5vw, 40px);
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -0.01em;
    }

    .lead {
      color: var(--muted);
      font-size: clamp(15px, 2.4vw, 17px);
      line-height: 1.65;
      margin: 0 0 36px;
    }

    .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,.07);
      margin: 0 0 32px;
    }

    .cta-block {
      background: linear-gradient(135deg, rgba(250,120,209,.08), rgba(111,195,255,.08));
      border: 1px solid rgba(250,120,209,.2);
      border-radius: var(--radius);
      padding: clamp(20px, 4vw, 28px) clamp(20px, 4vw, 32px);
    }

    .cta-heading {
      font-size: clamp(18px, 3.2vw, 24px);
      font-weight: 800;
      margin: 0 0 8px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .cta-label {
      font-size: clamp(13px, 2vw, 15px);
      color: var(--muted);
      margin: 0 0 20px;
      line-height: 1.5;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #0f0f10;
      font-weight: 700;
      font-size: clamp(14px, 2.2vw, 16px);
      border-radius: 100px;
      padding: 14px 28px;
      text-decoration: none;
      transition: opacity .18s, transform .18s;
      box-shadow: 0 4px 20px rgba(250,120,209,.3);
    }
    .btn:hover { opacity: .88; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    footer {
      margin-top: 40px;
      font-size: 13px;
      color: rgba(255,255,255,.25);
    }
    footer a { color: rgba(255,255,255,.4); text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">Peagi tagasi</div>

    <h1>Leht on täiendamisel ✨</h1>

    <p class="lead">
      Töötame uue hooaja kallal ning uuendame lehte.<br>
      Varsti leiab siit kõik vajaliku!
    </p>

    <hr class="divider" />

    <div class="cta-block">
      <p class="cta-heading">Tahad meid enda kandis näha? 📍</p>
      <p class="cta-label">Anna sellest märku — me tuleme hea meelega!</p>
      <a class="btn" target="_blank" href="https://kutsu.ligipaasetav.eu">
        ✉️ &nbsp;Anna märku
      </a>
    </div>
  </div>

  <footer>
    © Ligipääsetav stand-up &nbsp;·&nbsp;
    <a href="mailto:info@ligipaasetav.eu">info@ligipaasetav.eu</a>
  </footer>
</body>
</html>
